input_dir: data/raw
output_dir: data/cleaned
shard_size: 10000

filters:
  # Language identification (fasttext)
  language_id:
    enabled: true
    language: vi
    min_confidence: 0.7

  # Character-level length bounds
  length:
    enabled: true
    min_chars: 50
    max_chars: 100000

  # Fraction of non-alphanumeric + non-whitespace characters
  non_alphanum_ratio:
    enabled: true
    max_ratio: 0.3

  # Fraction of the document that is a single repeated character
  repeated_char_ratio:
    enabled: true
    max_ratio: 0.2

transformations:
  strip_html: true
  normalize_unicode: true    # NFC normalisation for Vietnamese diacritics
  normalize_whitespace: true
  strip_urls: false          # set true to remove all URLs
