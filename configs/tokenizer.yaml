input_dir: data/deduped
output_dir: artifacts/tokenizer
num_workers: 16
hf_repo: thuanan/vi-llm-pretrain-tokenizer

# Sampling: how much text to use for tokenizer training
max_train_chars: 10_000_000_000   # 10 GB

# BPE settings
vocab_size: 65536
min_frequency: 2
special_tokens:
  - "<s>"
  - "</s>"
  - "<pad>"
  - "<unk>"

# Normalisation applied before BPE
normalizer: NFC          # NFC | NFD | NFKC | NFKD | null

# Pre-tokeniser
pre_tokenizer: ByteLevel # ByteLevel handles all Unicode (including Vietnamese)
