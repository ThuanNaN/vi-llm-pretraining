# ── Model architecture (LLaMA-style 1B) ──────────────────────────────────────
model:
  hidden_size: 2048
  num_hidden_layers: 16
  num_attention_heads: 16
  num_key_value_heads: 8        # GQA
  intermediate_size: 5504       # ~2.7x hidden_size (SwiGLU)
  max_position_embeddings: 2048
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0
  attn_implementation: flash_attention_2

# ── Speed-ups ─────────────────────────────────────────────────────────────────
compile: false                  # torch.compile (PyTorch 2.x)
gradient_checkpointing: true

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  packed_dir: data/packed
  tokenizer_dir: artifacts/tokenizer
  seq_length: 2048

# ── Training hyperparams ─────────────────────────────────────────────────────
training:
  per_device_batch_size: 4
  gradient_accumulation_steps: 8   # effective batch ~32 per GPU
  num_train_steps: 100000
  warmup_steps: 2000
  learning_rate: 3.0e-4
  lr_scheduler: cosine
  weight_decay: 0.1
  max_grad_norm: 1.0
  dtype: auto                       # auto | bf16 | fp16 | fp32

# ── Checkpointing ────────────────────────────────────────────────────────────
checkpoint:
  output_dir: artifacts/checkpoints/1b
  save_every_steps: 1000
  hf_repo: null                     # "username/vi-llm-1b" to auto-push

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  wandb_project: vi-llm-pretrain
  log_every_steps: 10
