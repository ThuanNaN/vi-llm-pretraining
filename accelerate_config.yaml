# Universal Accelerate config — works on CUDA (single GPU) and Apple Silicon MPS.
# dtype and attention implementation are resolved automatically by trainer.py.
#
# For multi-GPU CUDA with FSDP use: accelerate launch --config_file accelerate_config_fsdp.yaml
compute_environment: LOCAL_MACHINE
distributed_type: NO
machine_rank: 0
main_training_function: main
mixed_precision: no   # handled in code — trainer.py resolves dtype per device
num_machines: 1
num_processes: 1
use_cpu: false
